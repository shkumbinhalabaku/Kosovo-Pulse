<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kosovo Market Pulse — Raporti 02 · Tregtia e Jashtme</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --void:#070B14; --surface:#0D1422; --surface2:#121C30;
  --line:rgba(140,165,210,.13); --line-strong:rgba(140,165,210,.25);
  --text:#E8EDF6; --muted:#8A99B5; --faint:#5A6A88;
  --blue:#4F8DFD; --blue-deep:#2A5BC0;
  --gold:#E5B84B; --green:#3DD68C; --red:#FF6B5E;
  --mono:'IBM Plex Mono',ui-monospace,monospace;
  --display:'Space Grotesk',sans-serif;
  --body:'Inter',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:var(--body);color:var(--text);background:var(--void);
  font-size:15px;line-height:1.6;
  background-image:
    radial-gradient(1100px 480px at 75% -120px, rgba(79,141,253,.10), transparent 65%),
    radial-gradient(800px 400px at 8% 12%, rgba(229,184,75,.05), transparent 60%),
    repeating-linear-gradient(90deg, rgba(140,165,210,.025) 0 1px, transparent 1px 96px);
}
.wrap{max-width:1240px;margin:0 auto;padding:0 24px}
a{color:var(--blue);text-decoration:none}

/* ============ top bar ============ */
.topbar{position:sticky;top:0;z-index:50;background:rgba(7,11,20,.86);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.topbar-in{display:flex;align-items:center;justify-content:space-between;gap:18px;padding:13px 0}
.logo{font-family:var(--display);font-weight:700;font-size:17px;letter-spacing:.2px;display:flex;align-items:center;gap:10px}
.logo .dot{width:9px;height:9px;border-radius:50%;background:var(--green);box-shadow:0 0 10px var(--green);animation:pulse 2.4s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.logo .gold{color:var(--gold)}
.report-badge{font-family:var(--mono);font-size:10px;letter-spacing:1.4px;color:var(--gold);border:1px solid rgba(229,184,75,.4);padding:4px 9px;border-radius:3px;text-transform:uppercase}
.topnav{display:flex;gap:4px;flex-wrap:wrap}
.topnav a{font-family:var(--mono);font-size:11px;letter-spacing:.6px;color:var(--muted);padding:6px 10px;border-radius:4px;text-transform:uppercase}
.topnav a:hover{color:var(--text);background:var(--surface2)}
.top-tools{display:flex;align-items:center;gap:12px}
.lang-toggle{display:flex;border:1px solid var(--line-strong);border-radius:4px;overflow:hidden;font-family:var(--mono);font-size:11.5px}
.lang-toggle button{background:transparent;border:0;padding:6px 11px;cursor:pointer;font-family:inherit;font-size:inherit;color:var(--muted)}
.lang-toggle button.active{background:var(--blue);color:#fff}
@media(max-width:900px){.topnav{display:none}}

/* ============ ticker ============ */
.ticker{border-bottom:1px solid var(--line);overflow:hidden;white-space:nowrap;background:var(--surface)}
.ticker-track{display:inline-block;padding:8px 0;font-family:var(--mono);font-size:12px;color:var(--muted);animation:tick 60s linear infinite}
.ticker-track span{margin:0 28px}
.ticker .au{color:var(--gold)}.ticker .up{color:var(--green)}.ticker .dn{color:var(--red)}
@keyframes tick{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@media (prefers-reduced-motion:reduce){.ticker-track{animation:none;white-space:normal}.logo .dot{animation:none}}

/* ============ hero ============ */
.hero{padding:50px 0 30px}
.kicker{font-family:var(--mono);font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);margin-bottom:14px;display:flex;align-items:center;gap:12px}
.kicker .sep{width:32px;height:1px;background:var(--gold);opacity:.5}
.hero h1{font-family:var(--display);font-weight:700;font-size:clamp(30px,4.6vw,50px);line-height:1.08;letter-spacing:-1px;max-width:20ch}
.hero h1 em{font-style:normal;color:var(--blue)}
.hero .lede{color:var(--muted);font-size:16px;margin-top:18px;max-width:64ch}
.hero .meta{font-family:var(--mono);font-size:11.5px;color:var(--faint);margin-top:22px}
.hero .meta b{color:var(--text)}

/* ============ top KPIs ============ */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin:22px 0 14px}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:16px;position:relative;transition:border-color .25s,transform .25s}
.kpi:hover{border-color:var(--line-strong);transform:translateY(-2px)}
.kpi .l{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.8px}
.kpi .v{font-family:var(--mono);font-size:24px;font-weight:600;margin:6px 0 3px;font-variant-numeric:tabular-nums}
.kpi .d{font-family:var(--mono);font-size:11px}
.up{color:var(--green)}.down{color:var(--red)}.neutral{color:var(--muted)}.au{color:var(--gold)}

/* ============ sections ============ */
section{padding:46px 0 8px}
.sec-head{display:flex;align-items:baseline;gap:14px;margin-bottom:6px}
.sec-head .num{font-family:var(--mono);font-size:12px;color:var(--blue);letter-spacing:1px}
.sec-head h2{font-family:var(--display);font-size:clamp(21px,2.6vw,28px);font-weight:700;letter-spacing:-.4px}
.sec-sub{color:var(--muted);font-size:14px;margin-bottom:24px;max-width:74ch}

/* ============ trade balance flow (block chart) ============ */
.balance-block{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:22px;margin-bottom:14px}
.balance-block h3{font-family:var(--display);font-size:14.5px;font-weight:500;color:var(--text);margin-bottom:16px}
.tri-split{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:8px}
@media(max-width:820px){.tri-split{grid-template-columns:1fr}}
.tri-cell{padding:16px;background:linear-gradient(160deg,var(--surface2),var(--surface));border:1px solid var(--line);border-radius:8px}
.tri-cell .lab{font-family:var(--mono);font-size:10.5px;letter-spacing:1px;color:var(--muted);text-transform:uppercase}
.tri-cell .v{font-family:var(--mono);font-size:22px;font-weight:600;margin:6px 0 3px;font-variant-numeric:tabular-nums}
.tri-cell .sub{font-family:var(--mono);font-size:11px;color:var(--faint)}
.tri-cell.export-side .v{color:var(--green)}
.tri-cell.import-side .v{color:var(--red)}
.tri-cell.balance-side .v{color:var(--gold)}

.mirror{display:grid;grid-template-columns:1fr auto 1fr;gap:14px;align-items:center;margin-top:14px}
@media(max-width:820px){.mirror{grid-template-columns:1fr}}
.mirror-side h4{font-family:var(--mono);font-size:11px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-bottom:10px}
.mirror-side.left h4{text-align:right}
.mbar{display:flex;justify-content:flex-end;align-items:center;height:34px;margin:6px 0;font-family:var(--mono);font-size:11.5px}
.mbar.imp{justify-content:flex-start}
.mbar .fill{height:100%;display:flex;align-items:center;padding:0 10px;color:#fff;font-weight:600;border-radius:3px;transition:width .8s cubic-bezier(.2,.8,.2,1);white-space:nowrap}
.mbar.exp .fill{background:linear-gradient(90deg,var(--blue-deep),var(--blue));justify-content:flex-end}
.mbar.imp .fill{background:linear-gradient(90deg,#8B3830,var(--red))}
.mbar .lbl{padding:0 10px;color:var(--muted);white-space:nowrap;font-size:12px}
.axis-center{width:2px;background:var(--line-strong);height:100%;min-height:400px}
@media(max-width:820px){.axis-center{display:none}}

/* ============ partner directory ============ */
.controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.chip{font-family:var(--mono);font-size:11px;letter-spacing:.5px;padding:7px 12px;background:var(--surface);border:1px solid var(--line);color:var(--muted);border-radius:20px;cursor:pointer;text-transform:uppercase;transition:all .2s}
.chip:hover{border-color:var(--line-strong);color:var(--text)}
.chip.active{background:var(--blue);border-color:var(--blue);color:#fff}
.partner-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.pcard{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:18px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.pcard::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--gold);opacity:0;transition:opacity .25s}
.pcard:hover{border-color:var(--line-strong);transform:translateY(-3px);box-shadow:0 12px 30px rgba(0,0,0,.35)}
.pcard:hover::before{opacity:1}
.pcard.selected{border-color:var(--gold)}
.pcard.selected::before{opacity:1}
.pcard-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.pcard-name{font-family:var(--display);font-size:17px;font-weight:600;letter-spacing:-.2px}
.pcard-flag{font-family:var(--mono);font-size:11px;color:var(--faint);letter-spacing:1.2px}
.pcard-group{font-family:var(--mono);font-size:9.5px;letter-spacing:1px;padding:3px 7px;border-radius:2px;text-transform:uppercase}
.pcard-group.eu{background:rgba(79,141,253,.15);color:var(--blue);border:1px solid rgba(79,141,253,.3)}
.pcard-group.cefta{background:rgba(229,184,75,.15);color:var(--gold);border:1px solid rgba(229,184,75,.3)}
.pcard-group.other{background:rgba(140,165,210,.15);color:var(--muted);border:1px solid var(--line-strong)}
.pcard-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.pcard-stat{padding:8px 0;border-bottom:1px dashed var(--line)}
.pcard-stat .l{font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:.5px}
.pcard-stat .n{font-family:var(--mono);font-size:16px;font-weight:600;font-variant-numeric:tabular-nums;margin-top:2px}
.pcard-balance{margin-top:12px;padding:10px 12px;border-radius:6px;font-family:var(--mono);display:flex;justify-content:space-between;align-items:center}
.pcard-balance.deficit{background:rgba(255,107,94,.08);border:1px solid rgba(255,107,94,.25)}
.pcard-balance.surplus{background:rgba(61,214,140,.08);border:1px solid rgba(61,214,140,.25)}
.pcard-balance .lbl{font-size:10.5px;letter-spacing:.8px;text-transform:uppercase;color:var(--muted)}
.pcard-balance .val{font-size:15px;font-weight:600;font-variant-numeric:tabular-nums}
.pcard-balance.deficit .val{color:var(--red)}
.pcard-balance.surplus .val{color:var(--green)}
.pcard-cta{margin-top:12px;font-family:var(--mono);font-size:10.5px;color:var(--blue);text-transform:uppercase;letter-spacing:.8px}
.pcard.selected .pcard-cta{color:var(--gold)}

/* ============ bilateral panel ============ */
.bilateral{background:linear-gradient(160deg,var(--surface2),var(--surface));border:1px solid var(--gold);border-radius:14px;padding:26px;margin-top:20px;display:none}
.bilateral.show{display:block;animation:reveal .5s ease}
@keyframes reveal{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.bil-head{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:12px;margin-bottom:20px}
.bil-title{font-family:var(--display);font-size:22px;font-weight:600}
.bil-title .code{color:var(--gold);font-family:var(--mono);font-size:14px;margin-left:8px}
.bil-close{font-family:var(--mono);font-size:11px;background:transparent;border:1px solid var(--line-strong);color:var(--muted);padding:5px 10px;border-radius:3px;cursor:pointer;text-transform:uppercase;letter-spacing:.5px}
.bil-close:hover{color:var(--text);border-color:var(--text)}
.bil-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:18px}
@media(max-width:820px){.bil-grid{grid-template-columns:1fr}}
.bil-col h4{font-family:var(--mono);font-size:11px;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--line-strong)}
.bil-col.exp h4{color:var(--green)}
.bil-col.imp h4{color:var(--red)}
.plist{display:flex;flex-direction:column;gap:8px}
.pitem{display:flex;justify-content:space-between;padding:7px 0;font-size:13.5px;border-bottom:1px dashed var(--line)}
.pitem:last-child{border-bottom:0}
.pitem .name{color:var(--text)}
.pitem .rank{font-family:var(--mono);color:var(--faint);font-size:11px;margin-right:8px}
.bil-insight{background:rgba(229,184,75,.08);border-left:3px solid var(--gold);padding:14px 16px;border-radius:0 6px 6px 0;margin-top:8px}
.bil-insight .tag{font-family:var(--mono);font-size:10px;letter-spacing:1.4px;color:var(--gold);text-transform:uppercase}
.bil-insight p{font-size:14px;margin-top:6px}

/* ============ product flow ============ */
.duo{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:880px){.duo{grid-template-columns:1fr}}
.panel{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:20px}
.panel h3{font-family:var(--display);font-size:14.5px;font-weight:500;margin-bottom:14px}
.panel .src{font-family:var(--mono);font-size:10px;color:var(--faint);margin-top:12px}
.chart-box{position:relative;height:290px}

/* ============ signals table ============ */
.signals{width:100%;border-collapse:collapse}
.signals th{font-family:var(--mono);font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--faint);text-align:left;padding:10px 12px;border-bottom:1px solid var(--line-strong)}
.signals td{padding:14px 12px;border-bottom:1px solid var(--line);font-size:13.5px;vertical-align:top}
.signals td.m{font-family:var(--mono);font-weight:600;white-space:nowrap;color:var(--text)}
.signals tr:hover td{background:rgba(79,141,253,.04)}
.badge{font-family:var(--mono);font-size:10px;letter-spacing:1px;padding:3px 9px;border-radius:3px;text-transform:uppercase;white-space:nowrap}
.badge.pos{color:var(--green);border:1px solid rgba(61,214,140,.45)}
.badge.risk{color:var(--red);border:1px solid rgba(255,107,94,.45)}
.badge.watch{color:var(--gold);border:1px solid rgba(229,184,75,.45)}
@media(max-width:760px){.signals .hide-m{display:none}}

/* takeaway */
.takeaway{border:1px solid rgba(229,184,75,.35);background:linear-gradient(120deg,rgba(229,184,75,.08),rgba(229,184,75,.02));padding:16px 18px;border-radius:10px;margin-top:16px}
.takeaway .tag{font-family:var(--mono);font-size:10px;letter-spacing:1.6px;color:var(--gold);text-transform:uppercase}
.takeaway p{font-size:14.5px;margin-top:6px;color:var(--text)}

/* reveal */
.reveal{opacity:0;transform:translateY(16px);transition:opacity .7s ease,transform .7s ease}
.reveal.in{opacity:1;transform:none}
@media (prefers-reduced-motion:reduce){.reveal{opacity:1;transform:none;transition:none}}

/* footer */
footer{margin-top:56px;border-top:1px solid var(--line-strong);padding:30px 0 48px;background:var(--surface)}
.foot-grid{display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:30px}
@media(max-width:760px){.foot-grid{grid-template-columns:1fr}}
footer h4{font-family:var(--display);font-size:14px;margin-bottom:8px}
footer p,footer li{font-size:12.5px;color:var(--muted)}
footer ul{list-style:none}
footer li{font-family:var(--mono);font-size:11.5px;margin:4px 0}
.byline{font-family:var(--mono);font-size:12px;margin-top:16px;color:var(--text)}
.byline .gold{color:var(--gold)}
.report-nav{display:flex;gap:12px;margin-top:10px}
.report-nav a{font-family:var(--mono);font-size:11px;letter-spacing:.5px;color:var(--muted);padding:6px 10px;border:1px solid var(--line);border-radius:3px;text-transform:uppercase}
.report-nav a:hover{color:var(--text);border-color:var(--line-strong)}
.report-nav a.this{color:var(--gold);border-color:rgba(229,184,75,.35)}
</style>
</head>
<body>

<div class="topbar"><div class="wrap topbar-in">
  <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">
    <div class="logo"><span class="dot"></span>Kosovo Market <span class="gold">Pulse</span></div>
    <span class="report-badge">Raporti 02</span>
  </div>
  <nav class="topnav">
    <a href="#overview" data-i18n="nav_ovw"></a>
    <a href="#partners" data-i18n="nav_partners"></a>
    <a href="#products" data-i18n="nav_products"></a>
    <a href="#signals" data-i18n="nav_signals"></a>
  </nav>
  <div class="top-tools">
    <div class="lang-toggle" role="group" aria-label="Language">
      <button id="btn-sq" onclick="setLang('sq')">SQ</button>
      <button id="btn-en" onclick="setLang('en')">EN</button>
    </div>
  </div>
</div></div>

<div class="ticker" aria-hidden="true"><div class="ticker-track" id="ticker-track"></div></div>

<main class="wrap">

<!-- ============ HERO ============ -->
<div class="hero reveal">
  <div class="kicker"><span data-i18n="kicker_r"></span><span class="sep"></span><span data-i18n="kicker_p"></span></div>
  <h1 data-i18n-html="headline"></h1>
  <p class="lede" data-i18n="lede"></p>
  <p class="meta" data-i18n-html="meta"></p>
</div>

<!-- KPIs -->
<div class="kpis reveal" id="kpi-row"></div>

<!-- ============ 01 OVERVIEW ============ -->
<section id="overview" class="reveal">
  <div class="sec-head"><span class="num">01</span><h2 data-i18n="sec1"></h2></div>
  <p class="sec-sub" data-i18n="sec1_sub"></p>

  <div class="balance-block">
    <h3 data-i18n="ch_bloc"></h3>
    <div class="tri-split">
      <div class="tri-cell export-side">
        <div class="lab">CEFTA</div>
        <div class="v" id="bloc-cefta-exp"></div>
        <div class="sub"><span data-i18n="exp"></span> · <span id="bloc-cefta-imp-sub"></span></div>
      </div>
      <div class="tri-cell export-side">
        <div class="lab">BE / EU</div>
        <div class="v" id="bloc-eu-exp"></div>
        <div class="sub"><span data-i18n="exp"></span> · <span id="bloc-eu-imp-sub"></span></div>
      </div>
      <div class="tri-cell balance-side">
        <div class="lab" data-i18n="bloc_other"></div>
        <div class="v" id="bloc-other-exp"></div>
        <div class="sub"><span data-i18n="exp"></span> · <span id="bloc-other-imp-sub"></span></div>
      </div>
    </div>
    <div class="mirror">
      <div class="mirror-side left">
        <h4 data-i18n="mirror_exp"></h4>
        <div id="mirror-exp"></div>
      </div>
      <div class="axis-center"></div>
      <div class="mirror-side right">
        <h4 data-i18n="mirror_imp"></h4>
        <div id="mirror-imp"></div>
      </div>
    </div>
  </div>

  <div class="takeaway"><span class="tag" data-i18n="tk_tag"></span><p data-i18n="tk1"></p></div>
</section>

<!-- ============ 02 PARTNER DIRECTORY ============ -->
<section id="partners" class="reveal">
  <div class="sec-head"><span class="num">02</span><h2 data-i18n="sec2"></h2></div>
  <p class="sec-sub" data-i18n="sec2_sub"></p>

  <div class="controls" id="filter-chips"></div>
  <div class="partner-grid" id="partner-grid"></div>

  <div class="bilateral" id="bilateral">
    <div class="bil-head">
      <div><span class="bil-title" id="bil-title"></span></div>
      <button class="bil-close" onclick="closeBilateral()" data-i18n="close"></button>
    </div>
    <div class="bil-grid">
      <div class="bil-col exp">
        <h4 data-i18n="bil_exp_h"></h4>
        <div class="plist" id="bil-exp-list"></div>
      </div>
      <div class="bil-col imp">
        <h4 data-i18n="bil_imp_h"></h4>
        <div class="plist" id="bil-imp-list"></div>
      </div>
    </div>
    <div class="bil-insight">
      <span class="tag" data-i18n="bil_insight_tag"></span>
      <p id="bil-insight-text"></p>
    </div>
  </div>
</section>

<!-- ============ 03 PRODUCT FLOWS ============ -->
<section id="products" class="reveal">
  <div class="sec-head"><span class="num">03</span><h2 data-i18n="sec3"></h2></div>
  <p class="sec-sub" data-i18n="sec3_sub"></p>
  <div class="duo">
    <div class="panel">
      <h3 data-i18n="ch_exp_prod"></h3>
      <div class="chart-box"><canvas id="chartExpProducts"></canvas></div>
      <div class="src" id="src-exp-prod"></div>
    </div>
    <div class="panel">
      <h3 data-i18n="ch_imp_prod"></h3>
      <div class="chart-box"><canvas id="chartImpProducts"></canvas></div>
      <div class="src" id="src-imp-prod"></div>
    </div>
  </div>
  <div class="takeaway"><span class="tag" data-i18n="tk_tag"></span><p data-i18n="tk3"></p></div>
</section>

<!-- ============ 04 SIGNALS ============ -->
<section id="signals" class="reveal">

let LANG='sq', charts={}, filter='all', selected=null;
const fmtM = v => "€"+v.toLocaleString(LANG==='sq'?'de-DE':'en-US')+"M";
const fmtB = v => "€"+v.toLocaleString(LANG==='sq'?'de-DE':'en-US',{maximumFractionDigits:2})+(LANG==='sq'?" mld":"B");

function setLang(l){
  LANG=l; document.documentElement.lang=l;
  document.getElementById('btn-sq').classList.toggle('active',l==='sq');
  document.getElementById('btn-en').classList.toggle('active',l==='en');
  render();
}

function render(){
  const t=I18N[LANG];
  document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.getAttribute('data-i18n');if(t[k]!==undefined&&typeof t[k]==='string')el.textContent=t[k];});
  document.querySelectorAll('[data-i18n-html]').forEach(el=>{const k=el.getAttribute('data-i18n-html');if(t[k])el.innerHTML=t[k];});
  renderTicker(t);
  renderKPIs(t);
  renderOverview(t);
  renderFilters(t);
  renderPartners(t);
  renderSignals(t);
  renderCharts(t);
  if(selected) renderBilateral(t);
}

function renderTicker(t){
  const items=[
    ['au', LANG==='sq'?'ASK · OEK — Tregtia e Jashtme 2025':'ASK · OEK — Foreign Trade 2025'],
    ['up', (LANG==='sq'?'Eksporti total ':'Total exports ')+'€942.1M'],
    ['dn', (LANG==='sq'?'Importi total ':'Total imports ')+'€7.05'+(LANG==='sq'?' mld':'B')],
    ['au', (LANG==='sq'?'Partneri #1 eksport: Shqipëria (17%)':'#1 export partner: Albania (17%)')],
    ['au', (LANG==='sq'?'Partneri #1 import: Gjermania':'#1 import partner: Germany')],
    ['up', (LANG==='sq'?'Suficit vetëm me Malin e Zi: +€33M':'Only surplus: Montenegro +€33M')],
    ['dn', (LANG==='sq'?'Deficiti me DE+CN+TR: €2.37 mld':'Deficit with DE+CN+TR: €2.37B')],
    ['', (LANG==='sq'?'CEFTA merr 46% të eksporteve':'CEFTA takes 46% of exports')]
  ];
  const html=items.map(([c,x])=>`<span class="${c}">◆ ${x}</span>`).join('');
  document.getElementById('ticker-track').innerHTML=html+html;
}

function renderKPIs(t){
  const surplusCountries = PARTNERS.filter(p=>p.exp>p.imp).length;
  const top5exp = PARTNERS.slice(0,5).reduce((a,b)=>a+b.exp,0);
  const top3imp = PARTNERS.slice().sort((a,b)=>b.imp-a.imp).slice(0,3).reduce((a,b)=>a+b.imp,0);
  const bigDefTot = 793+698+737;
  const items=[
    {v:"120+", x:LANG==='sq'?"që marrin ose dërgojnë":"in either direction", c:'neutral'},
    {v:surplusCountries+"", x:LANG==='sq'?"nga 120+ (Mali i Zi)":"of 120+ (Montenegro)", c:'up'},
    {v:fmtM(Math.round(top5exp*10)/10), x:(top5exp/942.1*100).toFixed(0)+"% "+(LANG==='sq'?"e eksporteve":"of exports"), c:'up'},
    {v:fmtM(Math.round(top3imp)), x:LANG==='sq'?"DE + IT + TR":"DE + IT + TR", c:'down'},
    {v:fmtB(bigDefTot/1000), x:"~39% "+(LANG==='sq'?"e deficitit":"of deficit"), c:'down'},
    {v:"+18.2%", x:LANG==='sq'?"mars 2026 v/v":"March 2026 y/y", c:'au'}
  ];
  document.getElementById('kpi-row').innerHTML=items.map((it,i)=>`
    <div class="kpi"><div class="l">${t.kpi[i].l}</div><div class="v">${it.v}</div>
    <div class="d ${it.c}">${it.x}</div></div>`).join('');
}

function renderOverview(t){
  document.getElementById('bloc-cefta-exp').textContent=fmtM(TOTALS.cefta_exp_m)+" ("+TOTALS.cefta_exp_pct+"%)";
  document.getElementById('bloc-eu-exp').textContent=fmtM(TOTALS.eu_exp_m)+" ("+TOTALS.eu_exp_pct+"%)";
  document.getElementById('bloc-other-exp').textContent=fmtM(TOTALS.other_exp_m)+" ("+TOTALS.other_exp_pct+"%)";
  document.getElementById('bloc-cefta-imp-sub').textContent=(LANG==='sq'?"import ":"import ")+fmtM(TOTALS.cefta_imp_m)+" ("+TOTALS.cefta_imp_pct+"%)";
  document.getElementById('bloc-eu-imp-sub').textContent=(LANG==='sq'?"import ":"import ")+fmtM(TOTALS.eu_imp_m)+" ("+TOTALS.eu_imp_pct+"%)";
  document.getElementById('bloc-other-imp-sub').textContent=(LANG==='sq'?"import ":"import ")+fmtM(TOTALS.other_imp_m)+" ("+TOTALS.other_imp_pct+"%)";

  // Mirror bars — top 8 by export / top 8 by import
  const byExp = PARTNERS.slice().sort((a,b)=>b.exp-a.exp).slice(0,8);
  const byImp = PARTNERS.slice().sort((a,b)=>b.imp-a.imp).slice(0,8);
  const maxExp = Math.max(...byExp.map(p=>p.exp));
  const maxImp = Math.max(...byImp.map(p=>p.imp));
  document.getElementById('mirror-exp').innerHTML = byExp.map(p=>{
    const w = (p.exp/maxExp*100).toFixed(1);
    return `<div class="mbar exp"><span class="lbl">${p[LANG]}</span><div class="fill" style="width:${w}%">€${p.exp}M</div></div>`;
  }).join('');
  document.getElementById('mirror-imp').innerHTML = byImp.map(p=>{
    const w = (p.imp/maxImp*100).toFixed(1);
    return `<div class="mbar imp"><div class="fill" style="width:${w}%">€${p.imp}M</div><span class="lbl">${p[LANG]}</span></div>`;
  }).join('');
}

function renderFilters(t){
  const chips=[
    {k:'all', l:t.chip_all},
    {k:'CEFTA', l:'CEFTA'},
    {k:'EU', l:'BE / EU'},
    {k:'OTHER', l:LANG==='sq'?'Tjera':'Other'},
    {k:'surplus', l:t.chip_surplus},
    {k:'deficit', l:t.chip_deficit}
  ];
  document.getElementById('filter-chips').innerHTML=chips.map(c=>
    `<button class="chip ${c.k===filter?'active':''}" onclick="setFilter('${c.k}')">${c.l}</button>`
  ).join('');
}
function setFilter(f){filter=f;renderFilters(I18N[LANG]);renderPartners(I18N[LANG]);}

function renderPartners(t){
  let list = PARTNERS.slice();
  if(['CEFTA','EU','OTHER'].includes(filter)) list=list.filter(p=>p.group===filter);
  else if(filter==='surplus') list=list.filter(p=>p.exp>p.imp);
  else if(filter==='deficit') list=list.filter(p=>p.exp<=p.imp);
  document.getElementById('partner-grid').innerHTML = list.map(p=>{
    const bal = p.exp - p.imp;
    const isSurplus = bal>=0;
    const groupCls = p.group==='CEFTA'?'cefta':(p.group==='EU'?'eu':'other');
    return `<div class="pcard ${selected===p.code?'selected':''}" onclick="selectPartner('${p.code}')">
      <div class="pcard-top">
        <div><div class="pcard-name">${p[LANG]}</div><div class="pcard-flag">${p.code}</div></div>
        <span class="pcard-group ${groupCls}">${p.group==='EU'?'BE':p.group}</span>
      </div>
      <div class="pcard-stats">
        <div class="pcard-stat"><div class="l">${t.exp}</div><div class="n" style="color:var(--green)">€${p.exp}M</div></div>
        <div class="pcard-stat"><div class="l">${t.imp}</div><div class="n" style="color:var(--red)">€${p.imp}M</div></div>
      </div>
      <div class="pcard-balance ${isSurplus?'surplus':'deficit'}">
        <span class="lbl">${t.bil_balance}</span>
        <span class="val">${isSurplus?'+':'−'}€${Math.abs(Math.round(bal))}M</span>
      </div>
      <div class="pcard-cta">${selected===p.code?(LANG==='sq'?'↓ Zbritje':'↓ Details'):(LANG==='sq'?'Kliko për analizë →':'Click for analysis →')}</div>
    </div>`;
  }).join('');
}

function selectPartner(code){
  selected = selected===code ? null : code;
  renderPartners(I18N[LANG]);
  if(selected) {
    renderBilateral(I18N[LANG]);
    setTimeout(()=>document.getElementById('bilateral').scrollIntoView({behavior:'smooth',block:'nearest'}),100);
  } else {
    document.getElementById('bilateral').classList.remove('show');
  }
}
function closeBilateral(){selected=null;renderPartners(I18N[LANG]);document.getElementById('bilateral').classList.remove('show');}

function renderBilateral(t){
  const p = PARTNERS.find(x=>x.code===selected);
  if(!p) return;
  document.getElementById('bil-title').innerHTML = p[LANG] + `<span class="code">${p.code} · ${p.group==='EU'?'BE':p.group}</span>`;
  document.getElementById('bil-exp-list').innerHTML = p.exp_top.map((x,i)=>
    `<div class="pitem"><span><span class="rank">#${i+1}</span>${x[LANG]}</span></div>`
  ).join('');
  document.getElementById('bil-imp-list').innerHTML = p.imp_top.map((x,i)=>
    `<div class="pitem"><span><span class="rank">#${i+1}</span>${x[LANG]}</span></div>`
  ).join('');
  document.getElementById('bil-insight-text').textContent = p['note_'+LANG];
  document.getElementById('bilateral').classList.add('show');
}

function renderSignals(t){
  document.getElementById('signal-rows').innerHTML=t.signals.map(s=>`
    <tr><td>${s.i}</td><td class="m">${s.v}</td>
    <td class="hide-m" style="color:var(--muted)">${s.r}</td>
    <td><span class="badge ${s.s}">${s.b}</span></td></tr>`).join('');
}

/* charts */
Chart.defaults.color='#8A99B5';
Chart.defaults.borderColor='rgba(140,165,210,.10)';
const tick={font:{family:"'IBM Plex Mono'",size:10.5}};
const grid={color:'rgba(140,165,210,.08)'};
const base=e=>Object.assign({responsive:true,maintainAspectRatio:false,
  plugins:{legend:{display:false},tooltip:{backgroundColor:'#121C30',borderColor:'rgba(140,165,210,.25)',borderWidth:1,titleFont:{family:"'IBM Plex Mono'"},bodyFont:{family:"'IBM Plex Mono'"}}}},e);

function renderCharts(){
  Object.values(charts).forEach(c=>c.destroy());
  const ex = PRODUCT_FLOWS.exports;
  charts.exp=new Chart(document.getElementById('chartExpProducts'),{type:'bar',
    data:{labels:ex.map(x=>x[LANG]),datasets:[{data:ex.map(x=>x.v),borderRadius:3,
      backgroundColor:ex.map((x,i)=>i===ex.length-1?'#3A5078':(i<3?'#3DD68C':'#4F8DFD'))}]},
    options:base({indexAxis:'y',scales:{x:{grid,ticks:Object.assign({callback:v=>v+'%'},tick)},
      y:{grid:{display:false},ticks:{font:{family:"'Inter'",size:11}}}}})});
  const im = PRODUCT_FLOWS.imports;
  charts.imp=new Chart(document.getElementById('chartImpProducts'),{type:'bar',
    data:{labels:im.map(x=>x[LANG]),datasets:[{data:im.map(x=>x.v),borderRadius:3,
      backgroundColor:im.map((x,i)=>i===im.length-1?'#3A5078':(x.v>=8?'#FF6B5E':'#4F8DFD'))}]},
    options:base({indexAxis:'y',scales:{x:{grid,ticks:Object.assign({callback:v=>v+'%'},tick)},
      y:{grid:{display:false},ticks:{font:{family:"'Inter'",size:11}}}}})});
  document.getElementById('src-exp-prod').textContent = LANG==='sq'?'ASK / Dogana e Kosovës — 2025':'ASK / Kosovo Customs — 2025';
  document.getElementById('src-imp-prod').textContent = LANG==='sq'?'ASK / Dogana e Kosovës — 2025':'ASK / Kosovo Customs — 2025';
}

/* scroll reveal */
const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}}),{threshold:.05});
document.querySelectorAll('.reveal').forEach(el=>io.observe(el));

setLang('sq');
</script>
</body>
</html>
